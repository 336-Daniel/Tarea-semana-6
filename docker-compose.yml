version: "3.8"

services:

  #base de datos de keycloack
  postgres-keycloak:
    image: postgres:16
    container_name: postgres-gym-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - ./keycloak-data:/var/lib/postgresql/data
    networks:
      - appointments-network

  #servicio de keycloack
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: keycloak-gym
    command:
      - start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    depends_on:
      - postgres-keycloak
    networks:
      - appointments-network

#base de datos servicio ClassBooking
  postgrest-ClassBooking:
    image: postgres:16
    container_name: postgres-ClassBooking
    environment:
      POSTGRES_DB: ClassBooking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Uisrael.
    ports:
      - "5433:5432"
    networks:
      - appointments-network


networks:
  appointments-network:
    driver: bridge
